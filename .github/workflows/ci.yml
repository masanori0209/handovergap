name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,demo]"
      - run: ruff check .
      - run: pytest
      - run: handovergap demo
      - run: handovergap detect --scenario S001 --profile CS
      - run: handovergap evaluate --compare
      - run: handovergap retrieve-evidence --scenario S001 --profile CS --slot communication_status --mode hybrid
      - run: handovergap ingest examples/source_events/customer_escalation.jsonl --memory "Use CSV for this release; API support is deferred." --profile CS --task-context "Answer customer questions about the workaround."
      - run: handovergap report --dataset all --output reports/evaluation-latest.md
      - run: test -s reports/evaluation-latest.md
      - run: handovergap workload-benchmark --scenarios 100 --iterations 1
      - run: python examples/langchain_gate.py
      - run: python examples/llamaindex_gate.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: distributions
          path: dist/
